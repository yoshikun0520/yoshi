function detectEmotion(text){

  if(/嬉しい|楽しい|最高|好き|成功|ありがとう/.test(text))
    return "happy";

  if(/悲しい|つらい|泣|寂しい|失敗/.test(text))
    return "sad";

  if(/ムカつく|怒|最悪|嫌い|ふざけ/.test(text))
    return "angry";

  if(/え|マジ|本当|びっくり|すご/.test(text))
    return "surprised";

  return "normal";
}

let systemPrompt = characters.yoshikun;

function changeCharacter(){

  const select =
    document.getElementById("characterSelect");

  const custom =
    document.getElementById("customPrompt");

  if(select.value==="custom"){

    custom.style.display="block";

    systemPrompt =
      custom.value ||
      "親しみやすいAIとして会話してください";

  }else{

    custom.style.display="none";

    systemPrompt =
      characters[select.value];

  }

  localStorage.setItem(
    "character",
    select.value
  );
}
</script>
