<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="icon" href="favicon.png" type="image/png">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ff7eb6">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="apple-mobile-web-app-title" content="よしくんGPT">

<link rel="apple-touch-icon" href="icon-192.png">

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>よしくんGPT NEO</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 背景 -->

<!-- アプリ -->

<div id="app">

<!-- ヘッダー -->

<header>

<div class="left">

<div class="avatar">
🐱
</div>

<div>

<h1>よしくんGPT NEO</h1>

<h2>🎭 キャラクター</h2>

<select id="characterSelect" onchange="changeCharacter()">
  <option value="yoshikun">🐱 よしくん</option>
  <option value="teacher">👨‍🏫 教師</option>
  <option value="maid">☕ メイド</option>
  <option value="tsundere">😳 ツンデレ</option>
  <option value="custom">✏️ カスタム</option>
</select>

<textarea
  id="customPrompt"
  placeholder="カスタムキャラ設定"
  style="display:none;width:100%;margin-top:10px;"
></textarea>

<p id="status">
● よしくんとオンライン
</p>

</div>

</div>

<div class="right">

<button id="darkBtn"type="button">

🌙

</button>

<button id="menuBtn"type="button">

☰

</button>

</div>

</header>

<!-- メニュー -->

<nav id="menu">

<button id="clearHistory"type="button">

🗑 証拠隠滅

</button>

<button id="exportHistory"type="button">

💾 履歴保存

</button>

<button id="importHistory"type="button">

📂 履歴読込

</button>

<button id="speechBtn"type="button">

🔊 読み上げ

</button>

<button id="voiceBtn"type="button">

🎤 音声入力

</button>

</nav>

<!-- チャット -->

<main
    id="chat"
    aria-live="polite">

</main>

<!-- 入力中 -->

<div id="typing">

<span></span>

<span></span>

<span></span>

</div>

<!-- クイック質問 -->

<div id="quickArea">

<button>こんにちは</button>

<button>ゲーム</button>

<button>ラーメン</button>

<button>学校</button>

<button>AI</button>

<button>猫</button>

<button>面白い話</button>

<button>占い</button>

</div>

<!-- 入力欄 -->
<input
    id="input"
    type="text"
    autocomplete="off"
    placeholder="メッセージを入力"
    enterkeyhint="send">
<footer>

<button id="send"type="button">

送信
</button>


</footer>

</div>

<!-- テンプレート -->

<template id="userTemplate">

<div class="message user">

<div class="icon">

😊

</div>

<div class="bubble">

<span class="text"></span>

</div>

</div>

</template>

<template id="botTemplate">

<div class="message bot">

<div class="icon">

🐱

</div>

<div class="bubble">

<span class="text"></span>

</div>

</div>

</template>

<!-- JS -->
<script src="knowledge.js" defer></script><script src="script.js"></script>

<script src="storage.js"></script>

<script>
if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}
</script>
</body>
</html>
